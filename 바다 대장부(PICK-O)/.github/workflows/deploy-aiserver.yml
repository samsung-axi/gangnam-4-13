name: Deploy AI Server Only

on:
  push:
    branches:
      - 'aiserver/**'  # aiserver/로 시작하는 모든 브랜치
    paths:
      - 'aiserver/**'
  workflow_dispatch:

# GitHub Token 권한 설정
permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  deploy-aiserver:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}
    
    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2
      with:
        mask-password: 'true'
    
    - name: Build and push AI server image
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY_AISERVER }}
        IMAGE_TAG: ${{ github.sha }}
      run: |
        echo "🔨 AI Server 이미지 빌드 중..."
        cd aiserver
        
        docker buildx build \
          --platform linux/amd64 \
          --tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
          --tag $ECR_REGISTRY/$ECR_REPOSITORY:latest \
          --push \
          --progress=plain \
          -f Dockerfile \
          .
        
        echo "✅ AI Server 이미지 빌드 및 푸시 완료"
    
    - name: Deploy AI server to EC2
      env:
        EC2_HOST: ${{ secrets.EC2_HOST }}
        EC2_USER: ${{ secrets.EC2_USER }}
        EC2_KEY: ${{ secrets.EC2_PRIVATE_KEY }}
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ github.sha }}
      run: |
        echo "$EC2_KEY" > ec2_key.pem
        chmod 600 ec2_key.pem
        
        ssh -i ec2_key.pem -o StrictHostKeyChecking=no $EC2_USER@$EC2_HOST << EOF
          # AWS 자격증명 설정
          export AWS_ACCESS_KEY_ID="${{ secrets.AWS_ACCESS_KEY_ID }}"
          export AWS_SECRET_ACCESS_KEY="${{ secrets.AWS_SECRET_ACCESS_KEY }}"
          export AWS_DEFAULT_REGION="${{ secrets.AWS_REGION }}"
          
          # 디스크 공간 확보를 위한 Docker 정리
          echo "🧹 Docker 리소스 정리 중..."
          
          # AI 서버 컨테이너 중지 및 제거
          docker stop teamPicko-aiserver || true
          docker rm teamPicko-aiserver || true
          
          # AI 서버 관련 이미지만 선택적 삭제 (다른 서비스 보호)
          docker images --format "table {{.Repository}}:{{.Tag}}\t{{.ID}}" | grep aiserver | awk '{print \$2}' | xargs -I {} docker rmi -f {} || true
          
          # 사용하지 않는 컨테이너, 네트워크, 이미지 정리
          docker system prune -f
          
          # 디스크 공간 확인
          echo "🔍 정리 후 디스크 공간:"
          df -h
          
          # ECR 로그인
          aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | docker login --username AWS --password-stdin $ECR_REGISTRY
          
          # 새 AI 서버 이미지 pull (latest 태그 사용)
          docker pull $ECR_REGISTRY/${{ secrets.ECR_REPOSITORY_AISERVER }}:latest
          
          # docker-compose로 aiserver만 재시작 (네트워크 유지)
          docker compose --env-file ~/.env up -d aiserver
          
          # 헬스체크 (AI 서버는 시작 시간이 오래 걸림)
          sleep 60
          curl -f http://localhost:8001/health || echo "⚠️ AI Server health check failed"
          
          echo "✅ AI Server 개별 배포 완료"
        EOF
        
        rm ec2_key.pem
    
    # 배포 성공 시 GitHub CLI로 PR 생성
    - name: Create Pull Request to dev
      if: success()
      env:
        GITHUB_TOKEN: ${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}
        BRANCH_NAME: ${{ github.ref_name }}
      run: |
        echo "🔄 GitHub CLI로 dev PR 생성 중..."
        
        # 기존 PR 확인
        EXISTING_PR=$(gh pr list --head "${BRANCH_NAME}" --base "dev" --state open --json number --jq '.[0].number' 2>/dev/null || echo "")
        
        if [ -n "$EXISTING_PR" ] && [ "$EXISTING_PR" != "null" ]; then
          echo "⚠️ 기존 PR #${EXISTING_PR}이 이미 존재합니다"
        else
          # 새 PR 생성
          gh pr create \
            --title "feat(aiserver): ${BRANCH_NAME} 개발 완료" \
            --body "## AI Server 개발 완료
          
          🚀 **브랜치**: \`${BRANCH_NAME}\`
          📦 **배포 테스트**: 완료
          
          ### 테스트 완료
          - [x] Docker 빌드 성공
          - [x] EC2 배포 성공
          - [x] Health check 통과" \
            --base "dev" \
            --head "${BRANCH_NAME}"
          echo "✅ dev PR 생성 완료!"
        fi
    
