log_format debug_fmt '$remote_addr - [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" '
                      'upstream=$upstream_addr '
                      'upstream_response_time=$upstream_response_time '
                      'request_time=$request_time';

server {
    listen 80;
    server_name localhost;

    # 디버깅용 로그 설정
    access_log /var/log/nginx/access.log debug_fmt;
    error_log  /var/log/nginx/error.log warn;

    # gzip 압축 활성화 (성능 최적화)
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml application/javascript;
    
    root /usr/share/nginx/html;
    index index.html;

    # React Router 지원 — 모든 경로를 index.html로
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API 프록시 — /api 요청을 FastAPI로 전달
    location /api/ {
        proxy_pass http://backend:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Tenant-ID $http_x_tenant_id;
        
        # 장시간 실행되는 시뮬레이션을 위한 Timeout 설정 (300초)
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;

        # WebSocket 프록시 지원 (Agent 스트리밍 응답 등)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
