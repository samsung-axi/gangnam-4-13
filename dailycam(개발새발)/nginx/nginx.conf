user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 500M;  # 비디오 업로드를 위한 크기 제한

    # Gzip 압축
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript 
               application/json application/javascript application/xml+rss 
               application/rss+xml font/truetype font/opentype 
               application/vnd.ms-fontobject image/svg+xml;

    # 업스트림 서버 정의
    upstream fastapi_backend {
        server fastapi:8000;
    }

    # HTTP 서버 설정 (HTTPS로 리다이렉트)
    server {
        listen 80;
        server_name stream.dailycam.net;
        
        # HTTP에서 HTTPS로 리다이렉트
        return 301 https://$server_name$request_uri;
    }

    # HTTPS 서버 설정
    server {
        listen 443 ssl http2;
        server_name stream.dailycam.net;

        # SSL 인증서 설정
        ssl_certificate /etc/letsencrypt/live/stream.dailycam.net/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/stream.dailycam.net/privkey.pem;

        # SSL 설정
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        # 프론트엔드 정적 파일 서빙
        location / {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;
        }

        # favicon.ico를 favicon.png로 리다이렉트
        location = /favicon.ico {
            root /usr/share/nginx/html;
            try_files /favicon.png =404;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # API 요청을 FastAPI로 프록시
        location /api/ {
            proxy_pass http://fastapi:8000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            
            # 타임아웃 설정 (비디오 업로드/분석을 위해 길게 설정)
            proxy_connect_timeout 600s;
            proxy_send_timeout 600s;
            proxy_read_timeout 600s;
        }

        # HLS 스트리밍을 위한 설정
        location /api/live-monitoring/hls/ {
            proxy_pass http://fastapi:8000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            
            # HLS 스트리밍을 위한 캐시 비활성화
            proxy_cache off;
            proxy_buffering off;
            proxy_read_timeout 300s;
            
            # CORS 헤더 추가
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range' always;
            add_header 'Access-Control-Expose-Headers' 'Content-Length,Content-Range' always;
        }

        # 비디오 파일 서빙
        location /videos/ {
            proxy_pass http://fastapi:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            
            # 비디오 스트리밍을 위한 설정
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 300s;
            
            # CORS 헤더
            add_header 'Access-Control-Allow-Origin' '*' always;
        }

        # 임시 비디오 파일 서빙
        location /temp_videos/ {
            proxy_pass http://fastapi:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 300s;
            
            add_header 'Access-Control-Allow-Origin' '*' always;
        }

        # 정적 파일 캐싱
        location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
            root /usr/share/nginx/html;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

}

