user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 500M;

    # Gzip 압축
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript 
               application/json application/javascript application/xml+rss 
               application/rss+xml font/truetype font/opentype 
               application/vnd.ms-fontobject image/svg+xml;

    # 업스트림 서버 정의
    upstream fastapi_backend {
        server fastapi:8000;
    }

    # 스트리밍 서버 정의
    upstream streaming_server {
        server stream.dailycam.net:443;
    }

    # HTTP 서버 설정 (HTTPS로 리다이렉트)
    server {
        listen 80;
        server_name www.dailycam.net dailycam.net;
        
        # HTTP에서 HTTPS로 리다이렉트
        return 301 https://www.dailycam.net$request_uri;
    }

    # HTTPS 서버 설정 - www.dailycam.net (메인 서버)
    server {
        listen 443 ssl http2;
        server_name www.dailycam.net dailycam.net;

        # SSL 인증서 설정
        ssl_certificate /etc/letsencrypt/live/www.dailycam.net/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/www.dailycam.net/privkey.pem;

        # SSL 설정
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        # 프론트엔드 정적 파일 서빙
        location / {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;
        }

        # favicon.ico를 favicon.png로 리다이렉트
        location = /favicon.ico {
            root /usr/share/nginx/html;
            try_files /favicon.png =404;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # HLS 스트리밍 관련 API를 stream.dailycam.net으로 프록시 (가장 먼저 매칭)
        location /api/live-monitoring/start-hls-stream/ {
            proxy_pass https://stream.dailycam.net;
            proxy_http_version 1.1;
            proxy_set_header Host stream.dailycam.net;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_ssl_verify off;
            proxy_set_header Cookie $http_cookie;  # 인증 쿠키 전달
            proxy_connect_timeout 600s;
            proxy_send_timeout 600s;
            proxy_read_timeout 600s;
        }

        location /api/live-monitoring/stop-hls-stream/ {
            proxy_pass https://stream.dailycam.net;
            proxy_http_version 1.1;
            proxy_set_header Host stream.dailycam.net;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_ssl_verify off;
            proxy_set_header Cookie $http_cookie;
            proxy_connect_timeout 600s;
            proxy_send_timeout 600s;
            proxy_read_timeout 600s;
        }

        location /api/live-monitoring/stream-status/ {
            proxy_pass https://stream.dailycam.net;
            proxy_http_version 1.1;
            proxy_set_header Host stream.dailycam.net;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_ssl_verify off;
            proxy_set_header Cookie $http_cookie;
        }

        # HLS 스트리밍 요청을 stream.dailycam.net으로 프록시
        location /api/live-monitoring/hls/ {
            proxy_pass https://stream.dailycam.net;
            proxy_http_version 1.1;
            proxy_set_header Host stream.dailycam.net;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # SSL 검증 비활성화 (같은 인프라 내부)
            proxy_ssl_verify off;
            
            # HLS 스트리밍을 위한 캐시 비활성화
            proxy_cache off;
            proxy_buffering off;
            proxy_read_timeout 300s;
            
            # CORS 헤더 (프론트엔드에서 직접 접근 가능하도록)
            add_header 'Access-Control-Allow-Origin' 'https://www.dailycam.net' always;
            add_header 'Access-Control-Allow-Origin' 'https://dailycam.net' always;
            add_header 'Access-Control-Allow-Methods' 'GET, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range' always;
            add_header 'Access-Control-Expose-Headers' 'Content-Length,Content-Range' always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
        }

        # API 요청을 FastAPI로 프록시
        location /api/ {
            proxy_pass http://fastapi:8000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            
            # 타임아웃 설정 (비디오 업로드/분석을 위해 길게 설정)
            proxy_connect_timeout 600s;
            proxy_send_timeout 600s;
            proxy_read_timeout 600s;
        }

        # 비디오 파일 서빙
        location /videos/ {
            proxy_pass http://fastapi:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            
            # 비디오 스트리밍을 위한 설정
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 300s;
            
            # CORS 헤더
            add_header 'Access-Control-Allow-Origin' 'https://www.dailycam.net' always;
            add_header 'Access-Control-Allow-Origin' 'https://dailycam.net' always;
        }

        # 임시 비디오 파일 서빙
        location /temp_videos/ {
            proxy_pass http://fastapi:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 300s;
            
            add_header 'Access-Control-Allow-Origin' 'https://www.dailycam.net' always;
            add_header 'Access-Control-Allow-Origin' 'https://dailycam.net' always;
        }

        # 정적 파일 캐싱
        location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
            root /usr/share/nginx/html;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }
}

