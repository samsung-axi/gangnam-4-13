  nginx:
    image: nginx:alpine
    container_name: dailycam-nginx-prod
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.main.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro # SSL 인증서
    depends_on:
      - fastapi
    restart: unless-stopped
    networks:
      - dailycam-network

volumes:
  mysql_data:
    driver: local
  temp_videos:
    driver: local
  videos:
    driver: local

networks:
  dailycam-network:
    driver: bridge
