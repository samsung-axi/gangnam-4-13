version: '3.8'

services:
  # MySQL 서비스 제거 - 메인 서버의 DB를 사용합니다
  # 메인 서버의 DB에 접근하려면 MYSQL_REMOTE_HOST 환경 변수를 설정하세요

  fastapi:
    build: ./backend
    container_name: dailycam-fastapi-streaming
    ports:
      - "127.0.0.1:8000:8000"  # Nginx를 통해서만 접근
    # depends_on 제거 (메인 서버의 DB 사용)
    environment:
      - MYSQL_HOST=${MYSQL_REMOTE_HOST:-메인서버IP}  # 메인 서버의 Static IP 또는 Private IP
      - MYSQL_PORT=3306
      - MYSQL_USER=dailycam_user
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}  # 메인 서버와 동일한 비밀번호
      - MYSQL_DATABASE=dailycam
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - PORTONE_API_KEY=${PORTONE_API_KEY}
      - PORTONE_API_SECRET=${PORTONE_API_SECRET}
      - YOUTUBE_API_KEY=${YOUTUBE_API_KEY}
      - TAVILY_API_KEY=${TAVILY_API_KEY}
      - S3_BUCKET_NAME=${S3_BUCKET_NAME:-}
      - AWS_REGION=${AWS_REGION:-ap-northeast-2}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      - CLOUDFRONT_DOMAIN=${CLOUDFRONT_DOMAIN:-}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}
      - FRONTEND_URL=${FRONTEND_URL}
      - BACKEND_URL=${BACKEND_URL}
      - PYTHONUNBUFFERED=1
      - TZ=Asia/Seoul
      - ENVIRONMENT=production
      - ENABLE_HLS_STREAMING=true  # 스트리밍 서버에서는 HLS 스트림 활성화
    volumes:
      - ./backend/temp_videos:/app/temp_videos
      - ./backend/videos:/app/videos
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 1
    restart: unless-stopped
    networks:
      - dailycam-network

  nginx:
    image: nginx:alpine
    container_name: dailycam-nginx-streaming
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.streaming.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - fastapi
    restart: unless-stopped
    networks:
      - dailycam-network

# MySQL 볼륨 제거 (메인 서버의 DB 사용)

networks:
  dailycam-network:
    driver: bridge

