  ## 최종 확인사항
  - 원본 진단 내용({summary})에 없는 정보는 절대 추가하지 마세요
  - Summary에서 식별된 모든 의학 용어와 각각에 매칭되는 화장품 용어를 포함하세요
  - Sparse keywords는 전체 증상 키워드 풀과 2-3개의 성분을 포함해야 합니다
  - 의학 용어와 화장품 용어를 모두 포함하여 검색 커버리지를 최대화하세요
  - Dense query는 모든 의학 용어를 소비자 친화 표현으로 완전히 변환하세요

  이제 위 형식에 맞춰 정확하게 JSON으로 생성해주세요.

