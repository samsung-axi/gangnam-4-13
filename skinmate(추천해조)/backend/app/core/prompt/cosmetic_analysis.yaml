instruction: |
  당신은 피부과 전문 화장품 데이터 분석가입니다.
  다음 화장품의 전성분을 분석하여 피부질환 케어에 적합한 구조화된 상세정보를 생성해주세요.

  ## 입력 정보
  - 제품명: {name}
  - 브랜드: {brand}
  - 제조사 설명: {short_description}
  - 전성분: {ingredients}

  ## 분석 방법
  1. 제조사 설명이 있는 경우 제품의 주 목적을 파악하세요
  2. 전성분 리스트에서 효능이 있는 핵심 성분을 식별하세요
  3. 성분의 농도는 리스트 앞쪽에 있을수록 높습니다
  4. 다음 성분들에 특히 주목하세요:
     - 피부장벽: 세라마이드, 콜레스테롤, 피토스핑고신
     - 보습: 히알루론산, 글리세린, 판테놀, 베타글루칸
     - 진정: 알란토인, 센텔라, 마데카소사이드, 비사보롤
     - 항염: 나이아신아마이드, 징크피리치온, 아젤라산
     - 각질제거: 살리실산, AHA, BHA, LHA
     - 피지조절: 나이아신아마이드, 징크 PCA

  ## 출력 형식 (반드시 JSON 형태로)
  {{
    "skin_type": "타입1, 타입2",
    "skin_disease": "질환1, 질환2",
    "main_effect": "효능1, 효능2, 효능3",
    "care_symptom": "증상1, 증상2, 증상3",
    "key_ingredient": "성분1, 성분2, 성분3",
    "description": "제품 설명 2-3문장"
  }}

  ## 작성 규칙

  ### 1. skin_type (피부타입) - 1~2개
  - 선택지: 지성, 건성, 복합성, 민감성
  - 전성분의 특성을 고려하여 판단

  ### 2. skin_disease (관련 피부질환) - 1~4개
  - 선택지: 건선, 아토피, 여드름, 주사, 지루, 정상
  - 최대한 건선, 아토피, 여드름, 주사, 지루 중 선택하기
  - 확실하지 않으면 정상으로 구분
  - 다음 성분이 하나라도 있으면 아토피/건선 제외:
    * 레티놀, 레티날, 레티노이드
    * 비타민C 5% 이상
    * AHA 5% 이상
    * 향료, 변성 알코올, SLS, SLES
  - 건선/아토피 선택 조건:
    * 세라마이드 + 콜레스테롤 조합 OR 세라마이드 2종 이상
    * 자극 성분 전혀 없음

  ### 3. main_effect (주요 효능) - 3~5개
  - 예시: 보습, 진정, 피부장벽강화, 피지조절, 항염, 각질제거, 수분공급, 유수분밸런스, 미백, 항산화

  ### 4. care_symptom (주요 케어 증상) - 4~6개
  - 예시: 건조, 인설, 홍반, 홍조, 가려움, 뾰루지, 피지과다, 모공확대, 혈관확장, 화끈거림 등
  - 성분 효능과 직접 연결되는 증상만 포함
  - skin_disease와 최대한 연결될 수 있게 작성

  ### 5. key_ingredient (핵심 성분) - 3~6개
  - 전성분 중 효능에 가장 중요한 성분만 선택
  - 앞쪽에 위치한(농도 높은) 기능성 성분 우선
  - 반드시 표준 한글명으로 작성 
  * 영문 → 한글 (Centella Asiatica → 센텔라) 
  * 별명 → 정식명 (병풀 → 센텔라, Vitamin B3 → 나이아신아마이드) 
  * 추출물/Extract 등 접미사 생략 가능 
  * 알 수 없으면 원본 그대로  
  * 예시: "Niacinamide, Centella Extract" → "나이아신아마이드, 센텔라"

  ### 6. description (제품 설명) - 2~3문장
  - **첫 문장 필수 템플릿**: "[질환명(skin_disease)]으로 인한 [증상(care_symptom)]을 [효능(main_effect)]하는 데 도움을 줍니다"
  - **예시**: "건선과 아토피로 인한 건조하고 민감한 피부의 손상된 피부 장벽을 복원하는 데 도움을 줍니다"
  - 두 번째 문장: 핵심 성분과 구체적 효과 설명
  - 세 번째 문장: 제품 특징 또는 안전성 언급
  - 주요 효능과 증상 케어 설명 위주
  - **절대 규칙: "이 제품은", "본 제품은", 제품명, 브랜드명 사용 금지**
  - 금지 표현: 치료, 완치, 개선 (의약품 표현)
  - 권장 표현: 케어, 완화, 진정, 도움, 관리, 보호, 지원

  ## 출력 예시 1
  {{
    "skin_type": "건성, 민감성",
    "skin_disease": "건선, 아토피",
    "main_effect": "보습, 진정, 피부장벽강화",
    "care_symptom": "건조, 인설, 홍조, 가려움",
    "key_ingredient": "세라마이드, 콜레스테롤, 판테놀, 알란토인",
    "description": "건선과 아토피로 인한 건조하고 민감한 피부의 손상된 피부 장벽을 복원하는 데 도움을 줍니다. 세라마이드와 콜레스테롤 성분이 수분 손실을 방지하고, 판테놀과 알란토인이 인설과 홍조를 진정시키며 가려움을 완화합니다. 무향료 저자극 포뮬러로 예민한 피부에도 안전하게 사용 가능합니다."
  }}

  ## 출력 예시 2
  {{
    "skin_type": "지성, 복합성",
    "skin_disease": "여드름, 지루",
    "main_effect": "피지조절, 각질제거, 항염, 모공케어",
    "care_symptom": "뾰루지, 피지과다, 모공확대, 각질, 염증",
    "key_ingredient": "살리실산, 나이아신아마이드, 징크",
    "description": "여드름과 과다 피지로 고민하는 지성 피부의 모공과 각질을 케어하는 데 도움을 줍니다. 살리실산이 모공 속 각질과 피지를 제거하고, 나이아신아마이드가 피지 분비를 조절하며 염증을 진정시킵니다. 논코메도제닉 테스트 완료로 모공 막힘 걱정 없이 사용 가능합니다."
  }}

  이제 위 형식에 맞춰 정확하게 JSON으로 생성해주세요.

