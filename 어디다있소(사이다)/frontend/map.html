<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>어디다있소 - 다이소 매장 상품찾기</title>
    <meta name="description" content="다이소 매장 내 상품 위치를 음성/텍스트로 찾아주는 스마트 키오스크 서비스">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/sunn-us/SUIT/fonts/variable/woff2/SUIT-Variable.css">
    <link rel="stylesheet" href="css/style.css">
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="images/logo.svg">
</head>

<body>

    <!-- HEADER -->
    <header class="header">
        <a href="index.html" class="header-logo">
            <div class="logo-icon"><span>Daiso</span></div>
            <div class="logo-text">
                어디<span class="red">다</span><span class="mix-iss">있</span><span class="red">소</span>
            </div>
        </a>

        <!-- Top Fixed Search Bar -->
        <div class="top-search-container">
            <div class="search-bar">
                <input type="text" id="search-input" placeholder="어떤 상품의 위치를 알고 싶으세요?"
                    onkeypress="if(event.key==='Enter') doSearch()">
                <svg class="search-icon" viewBox="0 0 24 24" onclick="doSearch()">
                    <path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" fill="none" stroke="currentColor"
                        stroke-width="2" stroke-linecap="round" />
                </svg>
            </div>
        </div>

        <div class="header-right">
            <div class="lang-toggle">
                <span class="active">KOR</span> / <span>ENG</span>
            </div>
            <button class="help-btn" onclick="showHelp()">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10"></circle>
                    <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path>
                    <line x1="12" y1="17" x2="12.01" y2="17"></line>
                </svg>
                도움말
            </button>
        </div>
    </header>

    <!-- MAIN CONTENT -->
    <main class="main-content" id="main-content">

        <!-- CATEGORY MAP VIEW is the only view shown on map.html -->

        <!-- STORE LAYOUT VIEW -->
        <div id="view-store-layout" class="store-layout-page"
            style="display: flex; height: calc(100vh - 180px); padding: 0 20px; box-sizing: border-box;">
            <div class="store-map-container"
                style="flex: 1; position: relative; background: #fff; border-radius: 12px; box-shadow: var(--shadow-card); display: flex; align-items: center; justify-content: center; overflow: hidden; margin-right: 20px;">
                <img id="store-map-img" src="images/map_b1.png" alt="B1 Map"
                    style="max-width: 100%; max-height: 100%; object-fit: contain;">

                <!-- 현위치 마커 -->
                <div id="current-location-marker"
                    style="position: absolute; bottom: 12%; left: 30%; display: flex; flex-direction: column; align-items: center; z-index: 10;">
                    <div
                        style="background: var(--color-primary); color: white; padding: 4px 8px; border-radius: 4px; font-weight: bold; font-size: 14px; position:relative; top:-5px;">
                        현위치</div>
                    <div
                        style="width: 14px; height: 14px; background: var(--color-primary); border-radius: 50%; border: 2px solid white; box-shadow: 0 0 0 4px rgba(229,0,0,0.2);">
                    </div>
                </div>
            </div>

            <div class="floor-toggles"
                style="width: 120px; display: flex; flex-direction: column; gap: 12px; justify-content: flex-start; padding-top: 10px;">
                <button class="floor-btn" id="btn-floor-b1" onclick="setFloor('B1')"
                    style="width: 100%; padding: 16px 0; border-radius: 8px; background: var(--color-primary); color: white; font-weight: 800; font-size: 16px; border: none; cursor: pointer; transition: all 0.3s;">B1</button>
                <button class="floor-btn" id="btn-floor-b2" onclick="setFloor('B2')"
                    style="width: 100%; padding: 16px 0; border-radius: 8px; background: white; color: var(--color-primary); font-weight: 800; font-size: 16px; border: 1px solid #ddd; cursor: pointer; transition: all 0.3s;">B2</button>
            </div>
        </div>

    </main>

    <!-- BOTTOM TAB BAR -->
    <nav class="tab-bar">
        <button class="tab-item" data-tab="home" onclick="location.href='index.html'">
            <svg viewBox="0 0 24 24" fill="currentColor">
                <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z" />
            </svg>
            홈
        </button>
        <button class="tab-item" data-tab="location" onclick="location.href='location.html'">
            <svg viewBox="0 0 24 24" fill="currentColor">
                <path
                    d="M15.5 14h-.79l-.28-.27A6.47 6.47 0 0016 9.5 6.5 6.5 0 109.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z" />
            </svg>
            상품위치찾기
        </button>
        <button class="tab-item" data-tab="category" onclick="location.href='category.html'">
            <svg viewBox="0 0 24 24" fill="currentColor">
                <path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z" />
            </svg>
            카테고리구역찾기
        </button>
        <button class="tab-item active" data-tab="map" onclick="location.href='map.html'">
            <svg viewBox="0 0 24 24" fill="currentColor">
                <path
                    d="M20.5 3l-.16.03L15 5.1 9 3 3.36 4.9c-.21.07-.36.25-.36.48V20.5c0 .28.22.5.5.5l.16-.03L9 18.9l6 2.1 5.64-1.9c.21-.07.36-.25.36-.48V3.5c0-.28-.22-.5-.5-.5zM15 19l-6-2.11V5l6 2.11V19z" />
            </svg>
            매장배치도
        </button>
    </nav>

    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <script src="js/app.js?v=15"></script>
    <script src="js/search.js?v=15"></script>
    <script src="js/map.js?v=15"></script>
    <script src="js/categories.js?v=15"></script>
    <script src="js/idle-timer.js"></script>
    <script>
        function setFloor(floor) {
            const img = document.getElementById('store-map-img');
            const marker = document.getElementById('current-location-marker');
            const b1Btn = document.getElementById('btn-floor-b1');
            const b2Btn = document.getElementById('btn-floor-b2');

            if (floor === 'B1') {
                img.src = 'images/map_b1.png';
                marker.style.display = 'flex';
                b1Btn.style.background = 'var(--color-primary)';
                b1Btn.style.color = 'white';
                b1Btn.style.border = 'none';
                b2Btn.style.background = 'white';
                b2Btn.style.color = 'var(--color-primary)';
                b2Btn.style.border = '1px solid #ddd';
            } else {
                img.src = 'images/map_b2.png';
                marker.style.display = 'none';
                b2Btn.style.background = 'var(--color-primary)';
                b2Btn.style.color = 'white';
                b2Btn.style.border = 'none';
                b1Btn.style.background = 'white';
                b1Btn.style.color = 'var(--color-primary)';
                b1Btn.style.border = '1px solid #ddd';
            }
        }
    </script>
</body>

</html>
