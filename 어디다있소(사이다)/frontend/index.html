<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>어디다있소 - 다이소 매장 상품찾기</title>
    <meta name="description" content="다이소 매장 내 상품 위치를 음성/텍스트로 찾아주는 스마트 키오스크 서비스">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/sunn-us/SUIT/fonts/variable/woff2/SUIT-Variable.css">
    <link rel="stylesheet" href="css/style.css">
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="images/logo.svg">
</head>

<body>

    <!-- HEADER -->
    <header class="header">
        <a href="index.html" class="header-logo">
            <div class="logo-icon"><span>Daiso</span></div>
            <div class="logo-text">
                어디<span class="red">다</span><span class="mix-iss">있</span><span class="red">소</span>
            </div>
        </a>

        <!-- Top Fixed Search Bar -->
        <div class="top-search-container">
            <div class="search-bar">
                <input type="text" id="search-input" placeholder="어떤 상품의 위치를 알고 싶으세요?"
                    onkeypress="if(event.key==='Enter') { event.preventDefault(); doSearch(); }">
                <svg class="search-icon" viewBox="0 0 24 24" onclick="doSearch()">
                    <path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" fill="none" stroke="currentColor"
                        stroke-width="2" stroke-linecap="round" />
                </svg>
            </div>
        </div>

        <div class="header-right">
            <div class="lang-toggle">
                <span class="active">KOR</span> / <span>ENG</span>
            </div>
            <button class="help-btn" onclick="showHelp()">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10"></circle>
                    <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path>
                    <line x1="12" y1="17" x2="12.01" y2="17"></line>
                </svg>
                도움말
            </button>
        </div>
    </header>

    <!-- MAIN CONTENT -->
    <main class="main-content" id="main-content">

        <!-- HOME VIEW (default) -->
        <div id="view-home" style="width: 100%; height: 100%;">
            <!-- Daiso Mall Grid Layout -->
            <section class="daiso-grid">

                <!-- Grid Cells (Around the Void) -->
                <div class="grid-cell"
                    style="background-image: url('images/glasslock_banner.png'); background-size: cover; background-position: center;">
                    <div style="position: absolute; inset: 0; background: rgba(0,0,0,0.4);"></div>
                    <div
                        style="position: relative; z-index: 10; display: flex; align-items: center; justify-content: center; width: 100%; height: 100%; font-size: 20px; font-weight: 800; color: white;">
                        주방 식기 특별전</div>
                </div>

                <!-- MAIN CAROUSEL BANNER -->
                <div class="grid-cell" style="grid-column: span 2; padding: 0;">
                    <section class="carousel-section"
                        style="border-radius: var(--radius-md); overflow: hidden; height: 100%; min-height: 100%; margin: 0; position: relative;">
                        <div class="carousel-track" id="carousel-track" style="height: 100%;">
                            <!-- Slide 1 -->
                            <div class="carousel-slide"
                                style="background-image: url('images/spring_banner.png'); background-size: cover; background-position: center; height: 100%;">
                                <div style="position: absolute; inset: 0; background: rgba(0,0,0,0.3);"></div>
                                <div class="banner-text"
                                    style="position: relative; z-index: 10; padding: 30px; color: white; height: 100%; display: flex; flex-direction: column; justify-content: center;">
                                    <h2 style="font-size: 28px; font-weight: 800; margin-bottom: 8px;">SPRING PROMOTION
                                    </h2>
                                    <p style="font-size: 16px; opacity: 0.9;">봄맞이 새단장 기획전</p>
                                </div>
                            </div>
                            <!-- Slide 2 -->
                            <div class="carousel-slide"
                                style="background-image: url('images/living_banner.png'); background-size: cover; background-position: center; height: 100%;">
                                <div style="position: absolute; inset: 0; background: rgba(0,0,0,0.3);"></div>
                                <div class="banner-text"
                                    style="position: relative; z-index: 10; padding: 30px; color: white; height: 100%; display: flex; flex-direction: column; justify-content: center;">
                                    <h2 style="font-size: 28px; font-weight: 800; margin-bottom: 8px;">다이소 생활꿀템</h2>
                                    <p style="font-size: 16px; opacity: 0.9;">실용만점 수납용품 모음</p>
                                </div>
                            </div>
                        </div>
                        <div class="carousel-dots"
                            style="position: absolute; bottom: 15px; left: 0; right: 0; z-index: 20;">
                            <div class="dot active" onclick="goToSlide(0)"></div>
                            <div class="dot" onclick="goToSlide(1)"></div>
                        </div>
                    </section>
                </div>

                <div class="grid-cell"
                    style="background-image: url('images/spring_banner.png'); background-size: cover; background-position: center;">
                    <div style="position: absolute; inset: 0; background: rgba(0,0,0,0.3);"></div>
                    <div
                        style="position: relative; z-index: 10; display: flex; align-items: center; justify-content: center; width: 100%; height: 100%; font-size: 18px; font-weight: bold; color: white;">
                        봄꽃 신상</div>
                </div>

                <!-- CENTRAL VOID (Voice Search) -->
                <div class="grid-void">
                    <section class="voice-section" style="padding: 0;">
                        <button class="mic-button" id="mic-btn" onclick="toggleVoice()">
                            <div class="mic-ripple"></div>
                            <div class="mic-ripple"></div>
                            <div class="mic-ripple"></div>
                            <svg viewBox="0 0 24 24">
                                <path d="M12 1a4 4 0 00-4 4v6a4 4 0 008 0V5a4 4 0 00-4-4z" />
                                <path d="M19 10v1a7 7 0 01-14 0v-1M12 18.5v3M8 21.5h8" fill="none" stroke="white"
                                    stroke-width="2" stroke-linecap="round" />
                            </svg>
                        </button>
                        <p class="voice-label">어떤 상품의 위치를 알고 싶으세요?</p>
                    </section>
                </div>

                <div class="grid-cell"
                    style="background-image: url('images/wipes_banner.png'); background-size: cover; background-position: center;">
                    <div style="position: absolute; inset: 0; background: rgba(0,0,0,0.3);"></div>
                    <div
                        style="position: relative; z-index: 10; display: flex; align-items: center; justify-content: center; width: 100%; height: 100%; font-size: 18px; font-weight: bold; color: white;">
                        가성비 물티슈</div>
                </div>

                <div class="grid-cell"
                    style="background-image: url('images/wipes_banner.png'); background-size: cover; background-position: center;">
                    <div style="position: absolute; inset: 0; background: rgba(0,0,0,0.5);"></div>
                    <div
                        style="position: relative; z-index: 10; display: flex; align-items: center; justify-content: center; width: 100%; height: 100%; font-size: 16px; font-weight: bold; color: white;">
                        청소 끝판왕 싹스틱</div>
                </div>

                <div class="grid-cell"
                    style="background-image: url('images/glasslock_banner.png'); background-size: cover; background-position: center;">
                    <div style="position: absolute; inset: 0; background: rgba(0,0,0,0.4);"></div>
                    <div
                        style="position: relative; z-index: 10; display: flex; align-items: center; justify-content: center; width: 100%; height: 100%; font-size: 16px; font-weight: bold; color: white;">
                        베스트셀러 모음</div>
                </div>

                <div class="grid-cell"
                    style="background-image: url('images/living_banner.png'); background-size: cover; background-position: center;">
                    <div style="position: absolute; inset: 0; background: rgba(0,0,0,0.4);"></div>
                    <div
                        style="position: relative; z-index: 10; display: flex; align-items: center; justify-content: center; width: 100%; height: 100%; font-size: 16px; font-weight: bold; color: white;">
                        홈 에센셜 기획전</div>
                </div>

            </section>
        </div>

        <!-- LOADING VIEW -->
        <div id="view-loading" class="hidden">
            <div class="loading-screen">
                <div class="progress-ring-container">
                    <svg class="progress-ring" width="200" height="200">
                        <circle class="bg" cx="100" cy="100" r="90" />
                        <circle class="fill" id="progress-fill" cx="100" cy="100" r="90" />
                    </svg>
                    <div class="progress-percent" id="progress-text">0%</div>
                </div>
                <div style="font-size:48px;margin-top:-20px;color:#E50000;font-weight:800;">D</div>
                <p class="loading-text">상품을 찾는 중...</p>
                <div class="loading-query" id="loading-query">검색어</div>
            </div>
        </div>

        <!-- RESULTS VIEW -->
        <div id="view-results" class="hidden results-page">
            <div class="results-panel" id="results-panel">
                <h2 class="results-title" id="results-count">검색 결과 0개</h2>
                <div id="results-list"></div>
            </div>

            <div class="map-panel" id="map-panel">
                <!-- Map will be rendered here by JS -->
            </div>

            <div class="side-panel">
                <div class="qr-section">
                    <h4>스마트폰으로 스캔</h4>
                    <div id="qr-area"
                        style="width:140px;height:140px;margin:10px auto 20px;display:flex;align-items:center;justify-content:center;">
                    </div>
                    <button class="kakao-btn">
                        <div class="kakao-logo-bubble">TALK</div>
                        카카오로 보내기
                    </button>
                </div>
            </div>
        </div>

        <!-- CATEGORY MAP VIEW -->
        <div id="view-category" class="hidden category-page">
            <div class="category-map-area">
                <div class="floor-map" id="floor-b1">
                    <div class="floor-label">B1</div>
                    <div class="floor-title">B1 Floor</div>
                    <div class="map-grid" id="map-b1"></div>
                </div>
                <div class="floor-map" id="floor-b2">
                    <div class="floor-label">B2</div>
                    <div class="floor-title">B2 Floor</div>
                    <div class="map-grid" id="map-b2"></div>
                </div>
            </div>
            <div class="category-sidebar" id="category-sidebar">
                <!-- Generated by JS -->
            </div>
        </div>

    </main>

    <!-- BOTTOM TAB BAR -->
    <nav class="tab-bar">
        <button class="tab-item active" data-tab="home" onclick="location.href='index.html'">
            <svg viewBox="0 0 24 24" fill="currentColor">
                <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z" />
            </svg>
            홈
        </button>
        <button class="tab-item" data-tab="location" onclick="location.href='location.html'">
            <svg viewBox="0 0 24 24" fill="currentColor">
                <path
                    d="M15.5 14h-.79l-.28-.27A6.47 6.47 0 0016 9.5 6.5 6.5 0 109.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z" />
            </svg>
            상품위치찾기
        </button>
        <button class="tab-item" data-tab="category" onclick="location.href='category.html'">
            <svg viewBox="0 0 24 24" fill="currentColor">
                <path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z" />
            </svg>
            카테고리구역찾기
        </button>
        <button class="tab-item" data-tab="map" onclick="location.href='map.html'">
            <svg viewBox="0 0 24 24" fill="currentColor">
                <path
                    d="M20.5 3l-.16.03L15 5.1 9 3 3.36 4.9c-.21.07-.36.25-.36.48V20.5c0 .28.22.5.5.5l.16-.03L9 18.9l6 2.1 5.64-1.9c.21-.07.36-.25.36-.48V3.5c0-.28-.22-.5-.5-.5zM15 19l-6-2.11V5l6 2.11V19z" />
            </svg>
            매장배치도
        </button>
    </nav>

    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <script src="js/app.js?v=15"></script>
    <script src="js/search.js?v=15"></script>
    <script src="js/map.js?v=15"></script>
    <script src="js/categories.js?v=15"></script>
    <script src="js/idle-timer.js"></script>
</body>

</html>
