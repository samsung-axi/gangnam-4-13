name: Test Docker on Pull Request

on:
  pull_request:
    branches:
      - dev

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out the code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      # 이름 충돌 방지
      - name: Stop and Remove Existing Container
        run: |
          docker stop pr-test-container || true
          docker rm pr-test-container || true        

      - name: Build Docker Image
        run: |
          docker build \
          --build-arg DOMAIN=${{ secrets.DOMAIN }} \
          --build-arg BACKEND_URL=${{ secrets.BACKEND_URL }} \
          -t pr-test-image .
          docker images  # 빌드된 이미지 목록 확인

      - name: Run Docker Container
        run: |
          docker run -d -p 80:80 --name pr-test-container pr-test-image
          sleep 15  # 컨테이너가 완전히 실행될 때까지 대기
          docker ps -a  # 모든 컨테이너 상태 확인
          docker logs pr-test-container  # Nginx 로그 확인


      # Docker 컨테이너 내부에서 curl 테스트
      - name: Test Docker Container
        run: |
          docker exec pr-test-container curl -f http://localhost:80 || exit 1

      - name: Stop and Remove Docker Container
        if: always()
        run: |
          docker stop pr-test-container
          docker rm pr-test-container
