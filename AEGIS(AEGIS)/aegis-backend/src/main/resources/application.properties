spring.application.name=aegis-backend

# ==================== Database ====================
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/aegis}
spring.datasource.username=${DB_USERNAME:aegis}
spring.datasource.password=${DB_PASSWORD:trillion}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ==================== Redis ====================
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}

# ==================== MinIO (S3 Compatible) ====================
aws.s3.access-key=${AWS_S3_ACCESS_KEY:aegis}
aws.s3.secret-key=${AWS_S3_SECRET_KEY:trillion}
aws.s3.region=${AWS_S3_REGION:us-east-1}
aws.s3.bucket=${AWS_S3_BUCKET:clip}
aws.s3.endpoint=${AWS_S3_ENDPOINT:http://localhost:9000}

# ==================== JWT ====================
jwt.secret=${JWT_SECRET:your-secret-key-must-be-at-least-256-bits-long-for-hs256}
jwt.access-expiration=${JWT_ACCESS_EXPIRATION:900000}
jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:604800000}

# ==================== MediaMTX ====================
mediamtx.api-url=${MEDIAMTX_API_URL:http://localhost:9997}
mediamtx.webrtc-url=${MEDIAMTX_WEBRTC_URL:/stream}
mediamtx.srt-user=${MEDIAMTX_SRT_USER:aegis}
mediamtx.srt-password=${MEDIAMTX_SRT_PASSWORD:trillion}

# ==================== Clip ====================
clip.path=
clip.temp-path=temp
clip.download-endpoint=${CLIP_DOWNLOAD_ENDPOINT:https://localhost}
clip.presigned-url-expiration=${CLIP_PRESIGNED_URL_EXPIRATION:3600}

# ==================== Admin Initialization ====================
admin.email=${ADMIN_EMAIL:admin@aegis.local}
admin.password=${ADMIN_PASSWORD:changeyourpassword}
admin.name=${ADMIN_NAME:Admin}

# ==================== OpenAPI ====================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha

# ==================== Actuator ====================
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
