name: Terraform Destroy

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  TF_VERSION: "1.7.0"
  AWS_REGION: "ap-northeast-2"
  WORKING_DIR: "fargate"

jobs:
  terraform-destroy:
    name: Terraform Destroy
    runs-on: ubuntu-latest
    environment: destroy

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-duration-seconds: 14400

      - name: Terraform Init
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform init

      - name: Resolve Resource Names from Terraform State
        working-directory: ${{ env.WORKING_DIR }}
        shell: bash
        run: |
          set +e

          STATE_LIST=$(terraform state list 2>/dev/null || true)

          get_attr() {
            local addr="$1"
            local attr="$2"
            terraform state show -no-color "$addr" 2>/dev/null \
              | awk -F' = ' -v key="$attr" '$1 ~ "^[[:space:]]*" key "$" {gsub(/"/, "", $2); print $2; exit}'
          }

          ECS_CLUSTER_NAME=$(get_attr "aws_ecs_cluster.main" "name")
          RDS_IDENTIFIER=$(get_attr "aws_db_instance.postgres" "identifier")
          RDS_FINAL_SNAPSHOT_ID=$(get_attr "aws_db_instance.postgres" "final_snapshot_identifier")

          SECRET_IDS=""
          while IFS= read -r addr; do
            [ -z "$addr" ] && continue
            id=$(get_attr "$addr" "id")
            [ -n "$id" ] && SECRET_IDS="${SECRET_IDS}${id} "
          done < <(printf '%s\n' "$STATE_LIST" | grep '^aws_secretsmanager_secret\.' || true)

          ECS_SERVICE_NAMES=""
          while IFS= read -r addr; do
            [ -z "$addr" ] && continue
            name=$(get_attr "$addr" "name")
            [ -n "$name" ] && ECS_SERVICE_NAMES="${ECS_SERVICE_NAMES}${name} "
          done < <(printf '%s\n' "$STATE_LIST" | grep '^aws_ecs_service\.' || true)

          S3_BUCKET_NAMES=""
          while IFS= read -r addr; do
            [ -z "$addr" ] && continue
            bucket=$(get_attr "$addr" "bucket")
            [ -n "$bucket" ] && S3_BUCKET_NAMES="${S3_BUCKET_NAMES}${bucket} "
          done < <(printf '%s\n' "$STATE_LIST" | grep '^aws_s3_bucket\.' || true)

          ECR_REPOSITORY_NAMES=""
          while IFS= read -r addr; do
            [ -z "$addr" ] && continue
            repo=$(get_attr "$addr" "name")
            [ -n "$repo" ] && ECR_REPOSITORY_NAMES="${ECR_REPOSITORY_NAMES}${repo} "
          done < <(printf '%s\n' "$STATE_LIST" | grep '^aws_ecr_repository\.' || true)

          {
            echo "ECS_CLUSTER_NAME=${ECS_CLUSTER_NAME}"
            echo "ECS_SERVICE_NAMES=${ECS_SERVICE_NAMES}"
            echo "RDS_IDENTIFIER=${RDS_IDENTIFIER}"
            echo "RDS_FINAL_SNAPSHOT_ID=${RDS_FINAL_SNAPSHOT_ID}"
            echo "S3_BUCKET_NAMES=${S3_BUCKET_NAMES}"
            echo "ECR_REPOSITORY_NAMES=${ECR_REPOSITORY_NAMES}"
            echo "SECRET_IDS=${SECRET_IDS}"
          } >> "$GITHUB_ENV"

      - name: Force Delete Secrets Manager Secrets (pre-destroy)
        shell: bash
        run: |
          for SECRET in $SECRET_IDS; do
            aws secretsmanager delete-secret \
              --secret-id "$SECRET" \
              --force-delete-without-recovery \
              --region ${{ env.AWS_REGION }} 2>/dev/null || true
          done

      - name: Delete RDS Final Snapshot (pre-destroy)
        shell: bash
        run: |
          [ -n "${RDS_FINAL_SNAPSHOT_ID:-}" ] || exit 0
          aws rds delete-db-snapshot \
            --db-snapshot-identifier "$RDS_FINAL_SNAPSHOT_ID" \
            --region ${{ env.AWS_REGION }} 2>/dev/null || true

      - name: Scale Down ECS Services
        shell: bash
        run: |
          [ -n "${ECS_CLUSTER_NAME:-}" ] || exit 0
          [ -n "${ECS_SERVICE_NAMES:-}" ] || exit 0

          for svc in $ECS_SERVICE_NAMES; do
            aws ecs update-service \
              --cluster "$ECS_CLUSTER_NAME" \
              --service "$svc" \
              --desired-count 0 \
              --region ${{ env.AWS_REGION }} 2>/dev/null || true
          done

          aws ecs wait services-stable \
            --cluster "$ECS_CLUSTER_NAME" \
            --services $ECS_SERVICE_NAMES \
            --region ${{ env.AWS_REGION }} 2>/dev/null || true

      - name: Disable RDS Deletion Protection
        shell: bash
        run: |
          [ -n "${RDS_IDENTIFIER:-}" ] || exit 0

          aws rds modify-db-instance \
            --db-instance-identifier "$RDS_IDENTIFIER" \
            --no-deletion-protection \
            --apply-immediately \
            --region ${{ env.AWS_REGION }} 2>/dev/null || true

          aws rds wait db-instance-available \
            --db-instance-identifier "$RDS_IDENTIFIER" \
            --region ${{ env.AWS_REGION }} 2>/dev/null || true

      - name: Empty S3 Buckets
        shell: bash
        run: |
          for BUCKET in $S3_BUCKET_NAMES; do
            aws s3 rm "s3://$BUCKET" --recursive --region ${{ env.AWS_REGION }} 2>/dev/null || true

            while true; do
              VERSIONS=$(aws s3api list-object-versions \
                --bucket "$BUCKET" \
                --region ${{ env.AWS_REGION }} \
                --max-items 1000 \
                --query '{Objects: Versions[].{Key:Key,VersionId:VersionId}}' \
                --output json 2>/dev/null || echo '{"Objects":null}')
              COUNT=$(echo "$VERSIONS" | python3 -c "import sys,json; d=json.load(sys.stdin); print(len(d.get('Objects') or []))")
              [ "$COUNT" -eq 0 ] && break
              aws s3api delete-objects \
                --bucket "$BUCKET" \
                --delete "$VERSIONS" \
                --region ${{ env.AWS_REGION }} > /dev/null || true
            done

            while true; do
              MARKERS=$(aws s3api list-object-versions \
                --bucket "$BUCKET" \
                --region ${{ env.AWS_REGION }} \
                --max-items 1000 \
                --query '{Objects: DeleteMarkers[].{Key:Key,VersionId:VersionId}}' \
                --output json 2>/dev/null || echo '{"Objects":null}')
              COUNT=$(echo "$MARKERS" | python3 -c "import sys,json; d=json.load(sys.stdin); print(len(d.get('Objects') or []))")
              [ "$COUNT" -eq 0 ] && break
              aws s3api delete-objects \
                --bucket "$BUCKET" \
                --delete "$MARKERS" \
                --region ${{ env.AWS_REGION }} > /dev/null || true
            done
          done

      - name: Delete ECR Images
        shell: bash
        run: |
          for REPO in $ECR_REPOSITORY_NAMES; do
            IMAGE_IDS=$(aws ecr list-images \
              --repository-name "$REPO" \
              --region ${{ env.AWS_REGION }} \
              --query 'imageIds[*]' \
              --output json 2>/dev/null || echo '[]')
            COUNT=$(echo "$IMAGE_IDS" | python3 -c "import sys,json; print(len(json.load(sys.stdin)))")
            if [ "$COUNT" -gt 0 ]; then
              aws ecr batch-delete-image \
                --repository-name "$REPO" \
                --image-ids "$IMAGE_IDS" \
                --region ${{ env.AWS_REGION }} > /dev/null || true
            fi
          done

      - name: Terraform Destroy (non-IAM resources first)
        working-directory: ${{ env.WORKING_DIR }}
        shell: bash
        run: |
          TARGETS=$(terraform state list 2>/dev/null \
            | grep -v "^aws_iam_" \
            | sed 's/^/-target=/' \
            | tr '\n' ' ')
          if [ -n "$(echo "$TARGETS" | tr -d ' ')" ]; then
            terraform destroy -auto-approve $TARGETS
          fi

      - name: Terraform Destroy (IAM resources last)
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform destroy -auto-approve

      - name: Force Delete Secrets Manager Secrets
        if: always()
        shell: bash
        run: |
          for SECRET in $SECRET_IDS; do
            aws secretsmanager delete-secret \
              --secret-id "$SECRET" \
              --force-delete-without-recovery \
              --region ${{ env.AWS_REGION }} 2>/dev/null || true
          done
