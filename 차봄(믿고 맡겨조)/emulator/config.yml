# OBD 에뮬레이터 설정 파일
# 서버 1개 = 포트 1개 = 차량 1개. 다른 차량은 다른 config 또는 CLI로 실행.
# 예: python run_emulator.py --port COM4 --vehicle DEV_002

# 사용할 차량 ID (vehicles 중 하나). 없으면 첫 번째 차량.
vehicle_id: "DEV_003"

# 연결 설정
connection:
  port: "COM3"
  baudrate: 38400

# replay 모드로 CSV 재생 (static이면 초기값만 사용)
mode: replay

# 차량 프로필 (3대)
vehicles:
  # 차량 특정 테스트: 백엔드 vehicles.vin 또는 obd_device_vehicle_history(calid/cvn)와 맞추면 됨
  - id: "DEV_001"
    name: "YF Sonata"
    vin: "1HMXOBSGK693TJ7JR"
    calid: "SONATA_CAL_001"
    cvn: "A1B2C3D4"
    csv_file: "scenarios/test_trip.csv"
    mappings:
      # CSV 값은 이미 '사람 단위'이므로 formula는 단순 전달만 하고,
      # raw 바이트 스케일링은 run_emulator.py의 update_pids_from_dict에서만 처리하게 둔다.
      "010C": { col: "rpm", formula: "x" }            # rpm 그대로 → 내부에서 *4 → 디코드 후 원래 rpm
      "010D": { col: "speed", formula: "x" }          # km/h 그대로
      "0105": { col: "temp", formula: "x" }           # °C 그대로 → 내부에서 +40
      "0104": { col: "load", formula: "x" }           # % 그대로 → 내부에서 *2.55
      "0142": { col: "voltage", formula: "x" }        # V 그대로 → 내부에서 *1000
      "010B": { col: "map", formula: "x" }            # kPa 그대로
      "0110": { col: "maf", formula: "x" }            # g/s 그대로 → 내부에서 *100
      "010F": { col: "intake_temp", formula: "x" }    # °C 그대로 → 내부에서 +40
      "0111": { col: "throttle", formula: "x" }       # % 그대로 → 내부에서 *2.55
      "0106": { col: "fuel_trim_short", formula: "x" }# 현재는 사용하지 않지만 일관성 유지
      "0107": { col: "fuel_trim_long", formula: "x" }
    dtcs: ["P0115", "P0300"]

  - id: "DEV_002"
    name: "K5 Hybrid"
    vin: "KNAKU411B56382911"
    calid: "312J6000A4701000"
    cvn: "11223344"
    csv_file: "scenarios/driving_traffic.csv"
    mappings:
      "010C": { col: "rpm", formula: "x * 4" }
      "010D": { col: "speed", formula: "x" }
      "0105": { col: "temp", formula: "x + 40" }
      "0142": { col: "batt_volt", formula: "x * 1000" }
      "010B": { col: "map", formula: "x" }
      "0110": { col: "maf", formula: "x * 100" }
      "010F": { col: "intake_temp", formula: "x + 40" }
    dtcs: []

  - id: "DEV_003"
    name: "Genesis G80"
    vin: "KMHGN41EBJU183921"
    calid: "null"
    cvn: "6953cd4b"
    csv_file: "scenarios/fault_scenario.csv"
    mappings:
      "010C": { col: "rpm", formula: "x * 4" }
      "010D": { col: "speed", formula: "x" }
      "0105": { col: "temp", formula: "x + 40" }
      "0104": { col: "load", formula: "x * 2.55" }
      "0142": { col: "voltage", formula: "x * 1000" }
      "0111": { col: "throttle", formula: "x * 2.55" }
      "010B": { col: "map", formula: "x" }
      "0110": { col: "maf", formula: "x * 100" }
      "010F": { col: "intake_temp", formula: "x + 40" }
    dtcs: ["P0011"]

# 공통 설정
replay:
  interval: 0.5
  loop: false
