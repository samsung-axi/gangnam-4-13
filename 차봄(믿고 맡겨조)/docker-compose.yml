services:
  db:
    image: timescale/timescaledb-ha:pg15
    container_name: car-sentry-db
    restart: always
    environment:
      - POSTGRES_USER=${DB_USER:-postgres}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-postgres}
      - POSTGRES_DB=${DB_NAME:-car_sentry}
    ports:
      - "${DB_PORT:-5432}:5432"
    shm_size: 3gb
    volumes:
      - ./data/postgres_1024:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./db/seed_consumable.sql:/docker-entrypoint-initdb.d/02_seed_consumable.sql
      - ./db/seed_car_models_load.docker.sql:/docker-entrypoint-initdb.d/03_seed_car_models_load.sql
      - ./db/seed_car_models.csv:/docker-entrypoint-initdb.d/seed_car_models.csv
      - ./db/seed_dtc_data_load.docker.sql:/docker-entrypoint-initdb.d/04_seed_dtc_data_load.sql
      - ./db/seed_dtc_data.csv:/docker-entrypoint-initdb.d/seed_dtc_data.csv
      # - ./db/seed_v1.sql:/docker-entrypoint-initdb.d/05_seed_v1.sql
    networks:
      - car-sentry-network

  rabbitmq:
    image: rabbitmq:3.12-management
    container_name: car-sentry-mq
    restart: always
    environment:
      - RABBITMQ_DEFAULT_USER=${MQ_USER:-guest}
      - RABBITMQ_DEFAULT_PASS=${MQ_PASSWORD:-guest}
    ports:
      - "${MQ_PORT:-5672}:5672"
      - "${MQ_MANAGEMENT_PORT:-15672}:15672"
    networks:
      - car-sentry-network

  # 3. 데이터 저장소 (Redis)
  redis:
    image: redis:7-alpine
    container_name: car-sentry-redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    networks:
      - car-sentry-network

networks:
  car-sentry-network:
    driver: bridge
