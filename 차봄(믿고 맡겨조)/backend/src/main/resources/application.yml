spring:
  application:
    name: backend
  jackson:
    time-zone: Asia/Seoul
  
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:car_sentry}?stringtype=unspecified&sslmode=disable
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  main:
    lazy-initialization: false # 🚀 Ensure RabbitMQ consumers start immediately
  jpa:
    open-in-view: false # Disable OSIV for performance
    defer-datasource-initialization: false # SQL init를 Hibernate 초기화 이전에 먼저 실행하여 ALTER TABLE 반영
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        "[format_sql]": true
  
  sql:
    init:
      mode: always
      encoding: UTF-8

  batch:
    jdbc:
      initialize-schema: always # Batch 테이블 자동 생성
    job:
      enabled: false # 시작 시 모든 Job 실행 방지

  cloud:
    aws:
      region:
        static: ${S3_REGION:ap-northeast-2}
      credentials:
        access-key: ${S3_ACCESS_KEY:dummy}
        secret-key: ${S3_SECRET_KEY:dummy}
      s3:
        enabled: true
        bucket: ${S3_BUCKET_NAME:car-sentry-bucket}
      stack:
        auto: false

  rabbitmq:
    host: ${MQ_HOST:localhost}
    port: ${MQ_PORT:5672}
    username: ${MQ_USER:guest}
    password: ${MQ_PASSWORD:guest}
    listener:
      simple:
        concurrency: 2
        max-concurrency: 5
        retry:
          enabled: true
          initial-interval: 5000ms
          max-attempts: 3
          multiplier: 2.0

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      repositories:
        enabled: false




# Tomcat 기본 POST body 제한(2MB) 상향 — 큰 사진 업로드 시 413 방지 (배포 413 원인)
server:
  tomcat:
    max-http-post-size: 50MB
    max-swallow-size: 50MB

app:
  backend-url: ${APP_BACKEND_URL:http://localhost:8080}
  cors:
    allowed-origins: ${ALLOWED_ORIGINS:http://localhost:8080,http://localhost:19006,http://10.0.2.2:8080}
  storage:
    type: ${STORAGE_TYPE:local}  # 환경변수 사용, 기본값 local
  firebase:
    config-path: ${FIREBASE_CONFIG_PATH:firebase-service-account.json}
  openai:
    api-key: ${OPENAI_API_KEY:}
    diagnosis:
      model: ${OPENAI_DIAGNOSIS_MODEL:gpt-4o}

logging:
  file:
    name: logs/backend.log
  level:
    "[org.hibernate.SQL]": INFO
    "[org.hibernate.type.descriptor.sql.BasicBinder]": INFO
    org.springframework.web: INFO # 404 디버깅용 로그 원복 (너무 많아서 INFO로 조정)
    org.springframework.boot: INFO

# 암호화 키(코드는 가짜를 들고 있고, 서버가 진짜를 넣어주는 방식"이므로 보안상 안전함)
# 암호화 키 (환경변수 관리)
encryption:
  key: ${ENCRYPTION_KEY}

jwt:
  secret: ${JWT_SECRET}
  access-expiration: 3600000 # 1시간 (테스트 완료 후 원복)
  refresh-expiration: 604800000 # 7일

smartcar:
  client-id: ${SMARTCAR_CLIENT_ID:dummy}
  client-secret: ${SMARTCAR_CLIENT_SECRET:dummy}
  redirect-uri: ${SMARTCAR_REDIRECT_URI:http://localhost:8080/api/smartcar/callback}
  mode: ${SMARTCAR_MODE:test}


ocr:
  naver:
    invoke-url: ${NAVER_OCR_INVOKE_URL:}
    secret-key: ${NAVER_OCR_SECRET_KEY:}
  openai:
    api-key: ${OPENAI_API_KEY:}

kakao:
  pay:
    secret-key: ${KAKAO_PAY_SECRET_KEY:dummy}

# 백엔드가 AI 서버(진단/임베딩)를 호출할 때 사용. Docker 등에서 실행 시
# 백엔드에서 도달 가능한 주소로 설정 (예: http://host.docker.internal:8001 또는 실제 AI 서버 URL).
ai:
  server:
    url: ${AI_SERVER_URL:http://localhost:8001}

